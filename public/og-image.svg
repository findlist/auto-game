<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="tube" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰圆点 -->
  <circle cx="100" cy="80" r="60" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="550" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="950" cy="120" r="40" fill="rgba(255,255,255,0.05)"/>
  
  <!-- 左侧：试管图标装饰 -->
  <g transform="translate(80, 180)">
    <!-- 试管1 -->
    <rect x="0" y="20" width="70" height="200" rx="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <rect x="10" y="120" width="50" height="90" rx="25" fill="#FF6B6B"/>
    <rect x="10" y="80" width="50" height="40" fill="#4ECDC4"/>
    
    <!-- 试管2 -->
    <rect x="90" y="20" width="70" height="200" rx="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <rect x="100" y="160" width="50" height="50" rx="25" fill="#FFE66D"/>
    
    <!-- 试管3 -->
    <rect x="180" y="20" width="70" height="200" rx="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <rect x="190" y="100" width="50" height="110" rx="25" fill="#95E1D3"/>
    <rect x="190" y="60" width="50" height="40" fill="#FF6B6B"/>
  </g>
  
  <!-- 主标题 -->
  <text x="380" y="280" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="start">🎨 色彩排序</text>
  
  <!-- 副标题 -->
  <text x="380" y="340" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="28" fill="rgba(255,255,255,0.85)" text-anchor="start">经典好玩的颜色排序解谜游戏</text>
  
  <!-- 特性标签 -->
  <g transform="translate(380, 390)">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="rgba(255,255,255,0.2)"/>
    <text x="70" y="26" font-family="PingFang SC, sans-serif" font-size="16" fill="white" text-anchor="middle">100关闯关</text>
    
    <rect x="155" y="0" width="120" height="40" rx="20" fill="rgba(255,255,255,0.2)"/>
    <text x="215" y="26" font-family="PingFang SC, sans-serif" font-size="16" fill="white" text-anchor="middle">每日挑战</text>
    
    <rect x="290" y="0" width="120" height="40" rx="20" fill="rgba(255,255,255,0.2)"/>
    <text x="350" y="26" font-family="PingFang SC, sans-serif" font-size="16" fill="white" text-anchor="middle">无尽模式</text>
    
    <rect x="425" y="0" width="120" height="40" rx="20" fill="rgba(255,255,255,0.2)"/>
    <text x="485" y="26" font-family="PingFang SC, sans-serif" font-size="16" fill="white" text-anchor="middle">限时挑战</text>
  </g>
  
  <!-- 底部信息 -->
  <text x="380" y="500" font-family="PingFang SC, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)" text-anchor="start">免费游玩 · 无需下载 · 支持离线 · 完美适配手机</text>
  
  <!-- 域名 -->
  <text x="380" y="545" font-family="PingFang SC, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="start">game.niuzi.asia</text>
</svg>
